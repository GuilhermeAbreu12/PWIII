<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EsporteHub</title>
    <link rel="stylesheet" href="css/gerais.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="shortcut icon" href="imgs/logotipo.png" type="image/x-icon">
</head>
<body>
    <header>
        <div id="espaco-logo" class="espaco-logo visible">
            <a href="home.html">
                <img id="logo" src="imgs/ball3.svg" alt="Uma bola de futebol, logotipo do EsporteHub">
                <h1 id="nome-comercial">Esporte<span>Hub</span></h1>
            </a>
        </div>
    </header>
    <div id="background-form">
        <form action="home.html" method="POST">
            <div id="nome-escola">
                <label for="input-nome">Nome da escola:</label>
                <input type="text" id="input-nome" placeholder="Nome da escola">
            </div>
        
            <div id="codigo-escola">
                <label for="input-codigo-escola">Código da escola:</label>
                <input type="text" id="input-codigo-escola" placeholder="Código da escola">
            </div>
            <div id="senha-escola">
                <label for="input-senha">Senha:</label>
                <input type="password" id="input-senha" placeholder="Senha">
            </div>
            <div id="formas-entrada">
                <button type="submit">Entrar</button>
                <p>Não tem uma conta? <a href="#">Crie uma aqui.</a></p>
            </div>
        </form>
    </div>
</body>
</html>
