<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EsporteHub</title>
    <link rel="shortcut icon" href="/imgs/logotipo.png" type="image/x-icon">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/proximosJogos.css">
    <link rel="stylesheet" href="/css/footer.css">
    <link rel="stylesheet" href="/css/responsivo.css">
</head>
<body>
    <div class="centerLine"></div>
    <header>
        <div id="espaco-logo" class="espaco-logo visible">
            <a href="home.html">
                <img id="logo" src="/imgs/ball3.svg" alt="Uma bola de futebol, logotipo do EsporteHub">
                <h1 id="nome-comercial">Esporte<span>Hub</span></h1>
            </a>
        </div>
        <nav id="menu-desktop">
            <ul>
                <a href="geral.html">
                    <li>Dados Gerais</li>
                </a>
                <a href="modalidades.html">
                    <li>Modalidades</li>
                </a>
            </ul>
        </nav>
        <div id="menu-mobile-container">
            <ul>
                <a href="geral.html">
                    <li>Dados Gerais</li>
                </a>
                <a href="modalidades.html">
                    <li>Modalidades</li>
                </a>
            </ul>
        </div>
        <button id="menu-mobile">
            <div id="menu-hamburguer-icon" class="visible">
                <div class="menu-hamburguer-linha"></div>
                <div class="menu-hamburguer-linha"></div>
                <div class="menu-hamburguer-linha"></div>
            </div>
            <div id="menu-x-icon">
                <div class="menu-x-linha" id="menu-x-linha1"></div>
                <div class="menu-x-linha" id="menu-x-linha2"></div>
            </div>
        </button>
    </header>
    <main>
        <h2 id="titulo-pagina">Próximos jogos</h2>
        <div class="container-quadros">
            <div id="quadro1-jogos" class="quadro-jogos">
                <p class="inf-jogo">Vôlei - 19/02 - 13h</p>
                <div class="quadro-cards-times">
                    <div class="card-time">
                        <img src="/imgs/times/time1.svg" alt="Logotipo do time" class="time-logo">
                    </div>
                    <div class="card-time">
                        <img src="/imgs/times/time2.svg" alt="Logotipo do time" class="time-logo">
                    </div>
                </div>
                <div class="container-nome-times">
                    <div class="primeiro-time"><p>Flamengo</p></div>
                    <div class="versus"><p>VS</p></div>
                    <div class="segundo-time"><p>Palmeiras</p></div>
                </div>
            </div>
        
            <div id="quadro2-jogos" class="quadro-jogos">
                <p class="inf-jogo">Vôlei - 19/02 - 13h</p>
                <div class="quadro-cards-times">
                    <div class="card-time">
                        <img src="/imgs/times/time2.svg" alt="Logotipo do time" class="time-logo">
                    </div>
                    <div class="card-time">
                        <img src="/imgs/times/time1.svg" alt="Logotipo do time" class="time-logo">
                    </div>
                </div>
                <div class="container-nome-times">
                    <div class="primeiro-time"><p>Flamengo</p></div>
                    <div class="versus"><p>VS</p></div>
                    <div class="segundo-time"><p>Palmeiras</p></div>
                </div>
            </div>
        </div>
    </main>
    <footer>
        &copy; 2026. Criado e desenvolvido por Guilherme Abreu, João Pedro e Letícia
    </footer>
    <script src="/js/menuMobile.js" defer></script>
</body>
</html>
