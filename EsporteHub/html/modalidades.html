<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EsporteHub</title>
    <link rel="shortcut icon" href="/imgs/logotipo.png" type="image/x-icon">
    <link rel="stylesheet" href="/css/modalidades.css">
    <link rel="stylesheet" href="/css/footer.css">
</head>
<body>
    <div class="centerLine"></div>
    <header>
        <div id="espaco-logo" class="espaco-logo visible">
            <a href="home.html">
                <img id="logo" src="/imgs/ball3.svg" alt="Uma bola de futebol, logotipo do EsporteHub">
                <h1 id="nome-comercial">Esporte<span>Hub</span></h1>
            </a>
        </div>
        <nav id="menu-desktop">
            <ul>
                <a href="home.html">
                    <li>Página Inicial</li>
                </a>
                <a href="geral.html">
                    <li>Dados Gerais</li>
                </a>
            </ul>
        </nav>
        <div id="menu-mobile-container">
            <ul>
                <a href="home.html">
                    <li>Página Inicial</li>
                </a>
                <a href="geral.html">
                    <li>Dados Gerais</li>
                </a>
            </ul>
        </div>
        <button id="menu-mobile">
            <div id="menu-hamburguer-icon" class="visible">
                <div class="menu-hamburguer-linha"></div>
                <div class="menu-hamburguer-linha"></div>
                <div class="menu-hamburguer-linha"></div>
            </div>
            <div id="menu-x-icon">
                <div class="menu-x-linha" id="menu-x-linha1"></div>
                <div class="menu-x-linha" id="menu-x-linha2"></div>
            </div>
        </button>
    </header>
        <div id="selecionar-esporte-container">
            <form>
                <div class="esporte-label-input" id="esporte01-container">
                    <span class="label-text">Basquete</span>
                    <input type="checkbox" id="esporte01-input">
                    <label for="esporte01-input"></label>
                </div>

                <div class="esporte-label-input" id="esporte02-container">
                    <span class="label-text">Futebol</span>
                    <input type="checkbox" id="esporte02-input" checked>
                    <label for="esporte02-input"></label>
                </div>
                
                <div class="esporte-label-input" id="esporte03-container">
                    <span class="label-text">Ping-Pong</span>
                    <input type="checkbox" id="esporte03-input">
                    <label for="esporte03-input"></label>
                </div>
                
                <div class="esporte-label-input" id="esporte04-container">
                    <span class="label-text">Vôlei</span>
                    <input type="checkbox" id="esporte04-input">
                    <label for="esporte04-input"></label>
                </div>
            </form>
        </div>
    <footer>
        &copy; 2026. Criado e desenvolvido por Guilherme Abreu, João Pedro e Letícia
    </footer>
    <script src="/js/menuMobile.js" defer></script>
</body>
</html>
